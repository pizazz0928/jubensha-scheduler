name: Production checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Test, audit and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.21.1

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Run business tests
        run: pnpm test

      - name: Run code quality checks
        run: pnpm lint

      - name: Run TypeScript checks
        run: pnpm exec tsc --noEmit

      - name: Build production application
        run: pnpm build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  container:
    name: Build CloudBase container
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build --tag jubensha-scheduler:ci .

      - name: Start production container
        run: docker run --detach --name jubensha-ci --publish 3000:3000 --env AUTH_MODE=demo --env PORT=3000 jubensha-scheduler:ci

      - name: Verify container health and shared API
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/healthz > health.json; then
              curl --fail --silent --show-error http://127.0.0.1:3000/ > home.html
              curl --fail --silent --show-error http://127.0.0.1:3000/api/shared/snapshot > snapshot.json
              grep --quiet '"ok":true' health.json
              grep --quiet '"storageMode":"file"' snapshot.json
              exit 0
            fi
            sleep 1
          done
          docker logs jubensha-ci
          exit 1

      - name: Stop production container
        if: always()
        run: docker rm --force jubensha-ci
