name: Production checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Test, audit and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.21.1
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run business tests
        run: npm test

      - name: Run code quality checks
        run: npm run lint

      - name: Run TypeScript checks
        run: npx tsc --noEmit

      - name: Build production application
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  container:
    name: Build CloudBase container
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build --tag jubensha-scheduler:ci .
